[MITM]
# ======= 中间人攻击证书配置 =======
# 跳过服务器证书验证（关闭设为 false）
skip-server-cert-verify = true
# > 允许对 TCP 连接进行 MITM（关闭则仅对 HTTP/HTTPS 层生效）
tcp-connection = true
# 启用 HTTP/2 支持（关闭设为 false）
h2 = true
# MITM 主机名配置
hostname = sq-device.apple.com, www.google.*, *.tiktokv.com
# 禁用特定主机名的 MITM（可选，当前禁用 *.tiktokv.com）
hostname-disabled = *.tiktokv.com
# CA 证书密码
ca-passphrase = 
# CA 证书 P12 格式
ca-p12 = 

